<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-4 desc-4">
  <title id="title-4">The Slice as the Window</title>
  <desc id="desc-4">On the left, a grid of 200 small slice tiles in 20 columns by 10 rows, mostly dimmed gray with one tile near the center highlighted in orange. On the right, a zoomed view of the highlighted slice showing its three parts: a command (input), folded events (reads), and emitted events (writes). A dashed curve connects the highlighted tile to the zoom view, indicating the slice's anatomy is the entire cognitive scope when working on it.</desc>

  <defs>
    <pattern id="dimTileGrid" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="16" height="16" fill="#d8d8d8"/>
    </pattern>
  </defs>

  <rect width="900" height="480" fill="#fafaf7"/>

  <!-- Title -->
  <g font-family="Georgia, serif" text-anchor="middle">
    <text x="450" y="32" font-size="20" font-weight="600" fill="#1f1f1f">The slice is the window</text>
    <text x="450" y="52" font-size="12" font-style="italic" fill="#666">at any system scale, you (and the agent) work in one slice at a time</text>
  </g>

  <!-- Grid label -->
  <text x="220" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#666">200 slices · only one is lit</text>

  <!-- 200-tile grid (20 cols × 10 rows) -->
  <rect x="40" y="110" width="360" height="180" fill="url(#dimTileGrid)"/>
  <rect x="40" y="110" width="360" height="180" fill="none" stroke="#bbb" stroke-width="1"/>

  <!-- Highlighted tile (col=9, row=4) -->
  <rect x="202" y="182" width="16" height="16" fill="#c97a3f" stroke="#1f1f1f" stroke-width="1.5"/>

  <!-- Faded label below grid -->
  <text x="220" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#999">the other 199 — not in your head right now</text>

  <!-- Connecting curve from highlighted tile to zoom box -->
  <path d="M 220 199 C 320 220, 420 230, 488 240" stroke="#c97a3f" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="490,240 482,236 482,244" fill="#c97a3f"/>

  <!-- RIGHT: zoomed-in slice -->
  <g transform="translate(490, 130)">
    <rect x="0" y="0" width="370" height="220" rx="6" fill="#fff" stroke="#1f1f1f" stroke-width="2"/>

    <text x="185" y="26" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="600" fill="#1f1f1f">what's in scope</text>
    <text x="185" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#666">just this slice</text>

    <!-- Command -->
    <rect x="20" y="58" width="330" height="42" fill="#fff7e8" stroke="#9a7a3a" stroke-width="1.5" rx="3"/>
    <text x="32" y="76" font-family="Georgia, serif" font-size="11" font-weight="600" fill="#5e4818">command (input)</text>
    <text x="32" y="92" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#5e4818">e.g. SubmitReview(manuscriptId, reviewerId, verdict)</text>

    <!-- Folded events -->
    <rect x="20" y="110" width="330" height="46" fill="#f1f1ee" stroke="#888" stroke-width="1.2" rx="3"/>
    <text x="32" y="128" font-family="Georgia, serif" font-size="11" font-weight="600" fill="#444">reads (folded events)</text>
    <text x="32" y="144" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#444">ReviewerAssigned, ManuscriptSubmitted</text>
    <circle cx="262" cy="141" r="3" fill="#3a3a3a"/>
    <circle cx="278" cy="141" r="3" fill="#3a3a3a"/>

    <!-- Emitted events -->
    <rect x="20" y="166" width="330" height="42" fill="#ecf2ec" stroke="#5a8a5a" stroke-width="1.5" rx="3"/>
    <text x="32" y="184" font-family="Georgia, serif" font-size="11" font-weight="600" fill="#2f5a2f">emits (output)</text>
    <text x="32" y="200" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#2f5a2f">ReviewSubmitted</text>
    <circle cx="180" cy="197" r="3" fill="#2f5a2f"/>
  </g>

  <!-- Bottom annotation -->
  <g font-family="Georgia, serif" text-anchor="middle">
    <text x="450" y="395" font-size="14" fill="#1f1f1f">200 ≈ 20 ≈ 2 — for cognitive load.</text>
    <text x="450" y="418" font-size="11" font-style="italic" fill="#666">VSA's promise: the system's slice count doesn't expand your context window</text>
    <text x="450" y="438" font-size="11" font-style="italic" fill="#666">an agent's window holds one slice · the rest of the system stays outside it</text>
  </g>
</svg>
