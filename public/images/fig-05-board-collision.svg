<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-5 desc-5">
  <title id="title-5">Name collision on the modeling board</title>
  <desc id="desc-5">An event-model board with a single business lane and six event boxes in chronological order. Two of them are both labeled "Approved" and highlighted in red, with small italic captions noting they were intended for different parts of the business. A warning speech bubble above the lane reads "wait — didn't we already name something Approved?" with dashed lines pointing down to both red boxes. Bottom caption notes the board catches this in the moment of naming, with the parse-time assertion as a backstop for YAML edits that bypass the board.</desc>

  <rect width="900" height="400" fill="#fafaf7"/>

  <!-- Title -->
  <g font-family="Georgia, serif" text-anchor="middle">
    <text x="450" y="32" font-size="20" font-weight="600" fill="#1f1f1f">The board catches collisions</text>
    <text x="450" y="52" font-size="12" font-style="italic" fill="#666">in the moment of naming, before code exists</text>
  </g>

  <!-- Warning speech bubble -->
  <g transform="translate(475, 100)">
    <rect x="-145" y="-28" width="290" height="56" rx="8" fill="#fdeaea" stroke="#9a3a3a" stroke-width="2"/>
    <polygon points="-15,28 15,28 0,42" fill="#fdeaea" stroke="#9a3a3a" stroke-width="2"/>
    <line x1="-13" y1="28" x2="13" y2="28" stroke="#fdeaea" stroke-width="3"/>
    <text x="0" y="-7" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="600" fill="#7a2828">⚠ wait — didn't we already</text>
    <text x="0" y="13" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="600" fill="#7a2828">name something Approved?</text>
  </g>

  <!-- Dashed lines from speech bubble down to the two Approved boxes -->
  <g stroke="#c43a3a" stroke-width="1.5" stroke-dasharray="5,3" fill="none">
    <line x1="395" y1="143" x2="355" y2="200"/>
    <line x1="555" y1="143" x2="595" y2="200"/>
  </g>

  <!-- Lane label (above lane) -->
  <text x="45" y="175" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#666">business · one swimlane</text>

  <!-- The lane -->
  <rect x="40" y="180" width="820" height="80" fill="#fff" stroke="#999" stroke-width="1.2"/>

  <!-- Time arrow inside the lane (bottom) -->
  <g stroke="#bbb" stroke-width="1" fill="none">
    <line x1="60" y1="265" x2="840" y2="265"/>
    <polygon points="845,265 835,261 835,269" fill="#bbb"/>
  </g>
  <text x="845" y="278" text-anchor="end" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#999">time →</text>

  <!-- Event boxes -->
  <g font-family="Georgia, serif" text-anchor="middle">
    <rect x="60" y="200" width="100" height="40" fill="#fff7e8" stroke="#9a7a3a" stroke-width="1.5" rx="5"/>
    <text x="110" y="218" font-size="10" font-weight="600" fill="#5e4818">Manuscript-</text>
    <text x="110" y="231" font-size="10" font-weight="600" fill="#5e4818">Submitted</text>

    <rect x="180" y="200" width="100" height="40" fill="#fff7e8" stroke="#9a7a3a" stroke-width="1.5" rx="5"/>
    <text x="230" y="218" font-size="10" font-weight="600" fill="#5e4818">Reviewer-</text>
    <text x="230" y="231" font-size="10" font-weight="600" fill="#5e4818">Assigned</text>

    <!-- First Approved (RED) -->
    <rect x="305" y="200" width="100" height="40" fill="#fdeaea" stroke="#9a3a3a" stroke-width="2.5" rx="5"/>
    <text x="355" y="225" font-size="13" font-weight="700" fill="#7a2828">Approved</text>

    <rect x="425" y="200" width="100" height="40" fill="#fff7e8" stroke="#9a7a3a" stroke-width="1.5" rx="5"/>
    <text x="475" y="218" font-size="10" font-weight="600" fill="#5e4818">Draft-</text>
    <text x="475" y="231" font-size="10" font-weight="600" fill="#5e4818">Saved</text>

    <!-- Second Approved (RED) -->
    <rect x="545" y="200" width="100" height="40" fill="#fdeaea" stroke="#9a3a3a" stroke-width="2.5" rx="5"/>
    <text x="595" y="225" font-size="13" font-weight="700" fill="#7a2828">Approved</text>

    <rect x="665" y="200" width="100" height="40" fill="#fff7e8" stroke="#9a7a3a" stroke-width="1.5" rx="5"/>
    <text x="715" y="218" font-size="10" font-weight="600" fill="#5e4818">Manuscript-</text>
    <text x="715" y="231" font-size="10" font-weight="600" fill="#5e4818">Published</text>
  </g>

  <!-- Tiny intent annotations beneath the two Approved boxes -->
  <g font-family="Georgia, serif" text-anchor="middle">
    <text x="355" y="297" font-size="10" font-style="italic" fill="#7a2828">(meant for manuscript)</text>
    <text x="595" y="297" font-size="10" font-style="italic" fill="#7a2828">(meant for submission)</text>
  </g>

  <!-- Bottom caption -->
  <g font-family="Georgia, serif" text-anchor="middle">
    <text x="450" y="330" font-size="13" fill="#1f1f1f">The board catches what the assertion would catch —</text>
    <text x="450" y="350" font-size="13" fill="#1f1f1f">but earlier, in the moment of naming.</text>
    <text x="450" y="378" font-size="11" font-style="italic" fill="#666">the parse-time uniqueness assertion is the backstop · for YAML edits that bypass the board</text>
  </g>
</svg>
